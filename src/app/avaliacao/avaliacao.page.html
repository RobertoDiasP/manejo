<ion-header>
  <ion-toolbar>

    <ion-buttons slot="start">
      <ion-back-button defaultHref="/"></ion-back-button>
    </ion-buttons>
    <ion-title>Cadastro de Avaliação</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="avaliacaoForm">
    <ion-item>
      <ion-label position="floating">ID</ion-label>
      <ion-input formControlName="id"></ion-input>
    </ion-item>
    <ion-item>
      <ion-label position="floating">Data</ion-label>
      <ion-input formControlName="data"></ion-input>
    </ion-item>
    <ion-item>
      <ion-label position="floating">Talhão</ion-label>
      <ion-input formControlName="talhao"></ion-input>
    </ion-item>
    <ion-item>
      <ion-label position="floating">Observações</ion-label>
      <ion-textarea formControlName="observacoes"></ion-textarea>
    </ion-item>

  </form>
</ion-content>
