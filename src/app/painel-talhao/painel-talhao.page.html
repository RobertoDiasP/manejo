<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Painel Talhão</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-card class="ion-margin">
    <ion-card-header>
      <ion-card-title (click)="toggleFiltros()" >Filtros</ion-card-title>
    </ion-card-header>

    <ion-card-content *ngIf ="filtros">

      <!-- Nome Comercial -->
      <ion-item>
        <ion-label position="stacked">Nome</ion-label>
        <ion-input placeholder="Digite o nome"></ion-input>
      </ion-item>

      <!-- Categoria -->
      <ion-item>
        <ion-label position="stacked">Cultura</ion-label>
        <ion-input placeholder="Digite a Cultura"></ion-input>
      </ion-item>

      <!-- Marca -->
      <ion-item>
        <ion-label position="stacked">Data</ion-label>
        <ion-input placeholder="Digite a data"></ion-input>
      </ion-item>

      <!-- Preço mínimo -->
      <ion-item>
        <ion-label position="stacked">Localidade</ion-label>
        <ion-input placeholder="Digite a localidade" ></ion-input>
      </ion-item>

      <!-- Botões -->
      <div class="ion-margin-top ion-text-right">
        <ion-button color="medium" fill="outline">
          Limpar
        </ion-button>

        <ion-button color="primary">
          Buscar
        </ion-button>
      </div>

    </ion-card-content>
  </ion-card>
  <div class="grid-container">
    <div 
      class="talhao-card"
      *ngFor="let talhao of talhoes"
      [ngClass]="getCor(talhao.infestacao)"
      (click)="abrirDetalhe(talhao.id)"
    >
      <h2>{{ talhao.nome }}</h2>
      <p>Infestação: {{ talhao.infestacao }}%</p>
    </div>

  </div>
</ion-content>
