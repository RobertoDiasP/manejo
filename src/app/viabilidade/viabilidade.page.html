<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Viabilidade de Aplicação</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-card *ngFor="let talhao of talhoes">

    <ion-card-header>
      <ion-card-title>{{ talhao.nome }}</ion-card-title>
      <ion-card-subtitle>{{ talhao.cultura }}</ion-card-subtitle>
    </ion-card-header>

    <ion-card-content>

      <ion-item lines="none">
        <ion-icon name="water-outline" slot="start" color="primary"></ion-icon>
        <ion-label>Umidade: {{ talhao.umidade }}%</ion-label>
      </ion-item>

      <ion-item lines="none">
        <ion-icon name="speedometer-outline" slot="start" color="medium"></ion-icon>
        <ion-label>Vento: {{ talhao.vento }} km/h</ion-label>
      </ion-item>

      <ion-item lines="none">
        <ion-icon name="rainy-outline" slot="start" color="tertiary"></ion-icon>
        <ion-label>
          Chuva prevista: 
          {{ talhao.previsaoChuva ? 'Sim' : 'Não' }}
        </ion-label>
      </ion-item>

      <ion-badge 
        [color]="getStatusColor(talhao)" 
        class="status-badge">
        {{ getStatusTexto(talhao) }}
      </ion-badge>

    </ion-card-content>

  </ion-card>

</ion-content>
