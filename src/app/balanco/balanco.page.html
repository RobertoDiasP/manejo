<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Balanço dos Talhões</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-card *ngFor="let talhao of talhoes">
    <ion-card-header>
      <ion-card-title>{{ talhao.nome }}</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <p><strong>Produção:</strong> R$ {{ talhao.producao | number }}</p>
      <p><strong>Custo:</strong> R$ {{ talhao.custo | number }}</p>

      <p>
        <strong>Resultado:</strong>
        <span [ngClass]="{
          'lucro': calcularLucro(talhao) >= 0,
          'prejuizo': calcularLucro(talhao) < 0
        }">
          R$ {{ calcularLucro(talhao) | number }}
        </span>
      </p>
    </ion-card-content>
  </ion-card>

  <ion-card color="light">
    <ion-card-header>
      <ion-card-title>Total Geral</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <h2 [ngClass]="{
        'lucro': totalLucro >= 0,
        'prejuizo': totalLucro < 0
      }">
        R$ {{ totalLucro | number }}
      </h2>
    </ion-card-content>
  </ion-card>

</ion-content>
